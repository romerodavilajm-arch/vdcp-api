openapi: 3.0.3
info:
  title: VDCP – Visor de Comercio Popular
  description: API para la gestión del padrón comercial de puntos de venta
  version: 1.0.0

servers:
  - url: http://localhost:8080/api/v1
    description: Servidor de desarrollo

tags:
  - name: Puntos de Venta
  - name: Catálogos
  - name: Estadísticas

paths:
  /puntos-venta:
    get:
      tags: [Puntos de Venta]
      operationId: listPuntosVenta
      summary: Listar puntos de venta
      parameters:
        - name: delegacion
          in: query
          schema:
            type: string
        - name: afiliacion_id
          in: query
          schema:
            type: integer
            format: int64
        - name: colonia_id
          in: query
          description: Filtrar por identificador de colonia
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Lista de puntos de venta
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PuntoDeVenta"
        "500":
          $ref: "#/components/responses/ErrorInterno"

    post:
      tags: [Puntos de Venta]
      operationId: createPuntoDeVenta
      summary: Crear punto de venta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PuntoDeVentaInput"
      responses:
        "201":
          description: Punto de venta creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PuntoDeVenta"
        "400":
          $ref: "#/components/responses/ErrorValidacion"
        "500":
          $ref: "#/components/responses/ErrorInterno"

  /puntos-venta/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64

    get:
      tags: [Puntos de Venta]
      operationId: getPuntoDeVenta
      summary: Obtener punto de venta
      responses:
        "200":
          description: Detalle del punto de venta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PuntoDeVenta"
        "404":
          $ref: "#/components/responses/NoEncontrado"

    put:
      tags: [Puntos de Venta]
      operationId: updatePuntoDeVenta
      summary: Actualizar punto de venta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PuntoDeVentaInput"
      responses:
        "200":
          description: Punto de venta actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PuntoDeVenta"
        "404":
          $ref: "#/components/responses/NoEncontrado"

    delete:
      tags: [Puntos de Venta]
      operationId: deletePuntoDeVenta
      summary: Eliminar punto de venta
      responses:
        "204":
          description: Punto de venta eliminado
        "404":
          $ref: "#/components/responses/NoEncontrado"

  /estadisticas:
    get:
      tags: [Estadísticas]
      operationId: getEstadisticas
      summary: Estadísticas de afiliaciones
      responses:
        "200":
          description: Datos agregados por afiliación
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EstadisticaAfiliacion"

  /afiliaciones:
    get:
      tags: [Catálogos]
      operationId: listAfiliaciones
      summary: Listar afiliaciones
      responses:
        "200":
          description: Catálogo de afiliaciones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Afiliacion"

  /colonias:
    get:
      tags: [Catálogos]
      operationId: listColonias
      summary: Listar colonias
      responses:
        "200":
          description: Catálogo de colonias
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Colonia"

components:
  schemas:
    PuntoDeVentaInput:
      type: object
      required:
        - nombre
        - tipo_instalacion
        - estatus
        - delegacion
        - colonia_id
        - afiliacion_id
      properties:
        nombre:
          type: string
        tipo_instalacion:
          type: string
          enum: [tianguis, corredor, mercado, otro]
        estatus:
          type: string
          enum: [viable, no_viable]
        delimitaciones:
          type: string
        colonia_id:
          type: integer
          format: int64
        referencia:
          type: string
        delegacion:
          type: string
          enum:
            - Felipe Carrillo Puerto
            - Felix Osores Sotomayor
            - Josefa Vergara y Hernandez
            - Villa Cayetano Rubio
            - Epigmenio Gonzales
            - Santa Rosa Jauregui
            - Centro Historico
        poligono:
          type: string
        imagen_url:
          type: string
          format: uri
        dias_operacion:
          type: array
          items:
            type: string
            enum: [lunes, martes, miercoles, jueves, viernes, sabado, domingo]
        horario:
          type: string
        tipo_horario:
          type: string
          enum: [matutino, nocturno, mixto]
        asociacion:
          type: string
        afiliacion_id:
          type: integer
          format: int64
        representante_general:
          type: string
        estructura:
          type: string
        observaciones:
          type: string

    PuntoDeVenta:
      type: object
      properties:
        id:
          type: integer
          format: int64
        nombre:
          type: string
        tipo_instalacion:
          type: string
          enum: [tianguis, corredor, mercado, otro]
        estatus:
          type: string
          enum: [viable, no_viable]
        delimitaciones:
          type: string
        colonia_id:
          type: integer
          format: int64
        colonia:
          $ref: "#/components/schemas/Colonia"
        referencia:
          type: string
        delegacion:
          type: string
          enum:
            - Felipe Carrillo Puerto
            - Felix Osores Sotomayor
            - Josefa Vergara y Hernandez
            - Villa Cayetano Rubio
            - Epigmenio Gonzales
            - Santa Rosa Jauregui
            - Centro Historico
        poligono:
          type: string
        imagen_url:
          type: string
          format: uri
        dias_operacion:
          type: array
          items:
            type: string
            enum: [lunes, martes, miercoles, jueves, viernes, sabado, domingo]
        horario:
          type: string
        tipo_horario:
          type: string
          enum: [matutino, nocturno, mixto]
        asociacion:
          type: string
        afiliacion_id:
          type: integer
          format: int64
        afiliacion:
          $ref: "#/components/schemas/Afiliacion"
        representante_general:
          type: string
        estructura:
          type: string
        observaciones:
          type: string

    Afiliacion:
      type: object
      properties:
        id:
          type: integer
          format: int64
        nombre:
          type: string

    Colonia:
      type: object
      properties:
        id:
          type: integer
          format: int64
        nombre:
          type: string

    EstadisticaAfiliacion:
      type: object
      properties:
        afiliacion_id:
          type: integer
          format: int64
        afiliacion_nombre:
          type: string
        total_puntos_venta:
          type: integer

    Error:
      type: object
      properties:
        codigo:
          type: string
        mensaje:
          type: string

  responses:
    NoEncontrado:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ErrorValidacion:
      description: Datos de entrada inválidos
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ErrorInterno:
      description: Error interno del servidor
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"